[build]
  base = "frontend"
  publish = "build"
  command = "yarn build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"
  # Frontend never talks to a backend on this static deploy.
  REACT_APP_BACKEND_URL = "https://mybilbook.in"

# SPA — send all unknown paths to index.html so React Router can handle them.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed assets generated by CRA.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
